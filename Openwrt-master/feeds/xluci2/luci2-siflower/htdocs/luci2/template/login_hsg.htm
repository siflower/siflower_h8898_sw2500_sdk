<div class="wrapper">
	<div class="header custombgcolor">
		<div class="logo">
			<img src="" alt="">
			<div style="color: white;"></div>
		</div>
	</div>
	<div class="main_content flex_center">
		<div class="banner flex_center">
			<div class="loginBox">

				</div>

						<div class="forget_info" id="forgetpwd_page_tips" style="display: none;"><%:If you forget your password, please long press the reset button to restore the factory settings%></div>

				</div>
			</div>

	<div class="footer flex_center">
		<div></div>
